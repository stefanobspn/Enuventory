name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build-release:
    name: Build & attach release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provide local.properties (Supabase config)
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK with release tag
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/Enuventory-${{ github.event.release.tag_name }}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Enuventory-${{ github.event.release.tag_name }}.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: dist/Enuventory-${{ github.event.release.tag_name }}.apk
